<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Maestro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>Agent Maestro</h1>
    <span class="status"><span class="ws-dot off" id="ws-dot"></span> <span id="ws-label">disconnected</span></span>
  </header>
  <nav id="tabs">
    <button class="active" data-view="chat">Chat</button>
    <button data-view="dashboard">Dashboard</button>
    <button data-view="tasks">Tasks</button>
    <button data-view="agents">Agents</button>
    <button data-view="memory">Memory</button>
    <button data-view="config">Config</button>
  </nav>
  <main>
    <div id="chat-view" class="view active">
      <div class="chat-layout">
        <div class="chat-feed" id="chat-feed"></div>
        <aside class="runtime-sidebar">
          <div class="runtime-sidebar-card">
            <div class="runtime-sidebar-header">
              <h3>Live Runtime Output</h3>
              <span id="runtime-pane-count">0 panes</span>
            </div>
            <div class="pane-selector" id="pane-selector"></div>
            <pre class="pane-output runtime-pane-output" id="runtime-pane-output">Waiting for pane output…</pre>
          </div>
          <div class="runtime-sidebar-card">
            <div class="runtime-sidebar-header">
              <h3>Workspace Events</h3>
              <span id="event-count">0 events</span>
            </div>
            <div class="event-feed" id="event-feed"></div>
          </div>
        </aside>
      </div>
    </div>
    <div id="dashboard-view" class="view">
      <div class="dash-grid" id="dash-grid"></div>
    </div>
    <div id="tasks-view" class="view">
      <div class="filters" id="task-filters"></div>
      <table class="task-table"><thead><tr>
        <th>ID</th><th>Title</th><th>Assigned To</th><th>Wave</th><th>Status</th><th>Phase</th>
      </tr></thead><tbody id="task-tbody"></tbody></table>
    </div>
    <div id="agents-view" class="view">
      <div id="agents-container"></div>
    </div>
    <div id="memory-view" class="view">
      <div class="mem-layout">
        <div class="mem-sidebar" id="mem-sidebar"></div>
        <div class="mem-content"><pre class="config-display" id="mem-content">Loading memory tree...</pre></div>
      </div>
    </div>
    <div id="config-view" class="view">
      <pre class="config-display" id="config-display">Loading...</pre>
    </div>
  </main>
</div>
<script>
(() => {
'use strict';

// ── State ──────────────────────────────────────────────────────────
const S = {
  tasks: [], agents: [], config: null, session: null,
  logEntries: [], chatMessages: [], goal: '', ws: null, wsOk: false,
  panes: [], paneOutputs: {}, paneOutputMeta: {}, liveEvents: [], selectedPaneId: '',
  memoryTree: {}, memoryPath: '.', memoryFilePath: '',
};

const API = '';  // same origin
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

// ── Tab Navigation ─────────────────────────────────────────────────
$$('#tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    $$('#tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    $$('.view').forEach(v => v.classList.remove('active'));
    $(`#${btn.dataset.view}-view`).classList.add('active');
    if (btn.dataset.view === 'dashboard') renderDashboard();
    if (btn.dataset.view === 'tasks') renderTasks();
    if (btn.dataset.view === 'agents') renderAgents();
    if (btn.dataset.view === 'memory') renderMemoryBrowser();
  });
});

// ── Helpers ────────────────────────────────────────────────────────
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function agentColor(name) {
  const a = S.agents.find(x => x.name === name);
  if (a && a.color) return a.color;
  const colors = ['#FF6B6B','#4ECDC4','#FFEAA7','#F7DC6F','#a29bfe','#fd79a8','#74b9ff'];
  let h = 0;
  for (let i = 0; i < (name||'').length; i++) h = (h * 31 + name.charCodeAt(i)) & 0x7fffffff;
  return colors[h % colors.length];
}

function roleBadge(name) {
  const a = S.agents.find(x => x.name === name);
  const role = a ? a.role : 'worker';
  const cls = role === 'maestro' ? 'badge-maestro' : role === 'lead' ? 'badge-lead' : 'badge-worker';
  return `<span class="badge ${cls}">${role}</span>`;
}

function statusBadge(status) {
  const s = (status || 'pending').replace(/ /g, '_');
  return `<span class="status-badge status-${s}">${status}</span>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ── API Fetch ──────────────────────────────────────────────────────
async function api(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

async function loadAll() {
  const [goal, log, tasks, agents, config, session, panes] = await Promise.all([
    api('/api/workspace/goal'),
    api('/api/workspace/log'),
    api('/api/tasks'),
    api('/api/agents'),
    api('/api/config'),
    api('/api/session/active'),
    api('/api/tmux/panes'),
  ]);
  if (goal) S.goal = goal.content || '';
  if (log && log.entries) S.logEntries = log.entries;
  if (tasks) S.tasks = tasks;
  if (agents) S.agents = agents;
  if (config) S.config = config;
  if (session) S.session = session;
  if (Array.isArray(panes)) S.panes = panes;

  buildChatFromState();
  renderDashboard();
  renderTasks();
  renderAgents();
  renderConfig();
  await openMemoryDirectory('.', { preserveSelection: true });
  syncPaneSubscriptions();
}

// ── Chat: Build from state ─────────────────────────────────────────
function buildChatFromState() {
  S.chatMessages = [];
  for (const e of S.logEntries) {
    const msg = classifyLogEntry(e);
    S.chatMessages.push(msg);
  }
  for (const t of S.tasks) {
    if (t.handoffReport) {
      S.chatMessages.push({
        type: 'handoff', agent: t.assignedTo, ts: t.updatedAt,
        task: t, report: t.handoffReport,
      });
    }
    if (t.proposedApproach && (t.status === 'plan_ready' || t.status === 'plan_approved')) {
      S.chatMessages.push({
        type: 'plan_approval', agent: t.assignedTo, ts: t.updatedAt, task: t,
      });
    }
  }
  S.chatMessages.sort((a, b) => (a.ts || '').localeCompare(b.ts || ''));
  renderChat();
}

function classifyLogEntry(e) {
  const m = e.message || '';
  if (/delegated?\s+\S+\s+to/i.test(m)) {
    const match = m.match(/delegated?\s+(\S+)\s+to\s+(\S+)/i);
    const taskId = match ? match[1] : '';
    const target = match ? match[2] : '';
    const task = S.tasks.find(t => t.id === taskId);
    return { type: 'delegation', agent: e.agent, ts: e.timestamp, message: m, taskId, target, task };
  }
  if (/status.*(pending|in_progress|complete|failed|stalled|plan_ready|plan_approved)/i.test(m)) {
    const match = m.match(/(pending|in_progress|complete|failed|stalled|plan_ready|plan_approved|plan_revision_needed)/i);
    return { type: 'status_change', agent: e.agent, ts: e.timestamp, message: m, status: match ? match[1] : '' };
  }
  if (/reconcil/i.test(m)) {
    const pass = /pass/i.test(m);
    return { type: 'reconciliation', agent: e.agent, ts: e.timestamp, message: m, pass };
  }
  return { type: 'log', agent: e.agent, ts: e.timestamp, message: m };
}

// ── Chat: Render ───────────────────────────────────────────────────
function renderChat() {
  const feed = $('#chat-feed');
  feed.innerHTML = '';
  if (S.chatMessages.length === 0) {
    feed.innerHTML = '<div style="text-align:center;color:var(--text3);padding:40px;">No messages yet. Waiting for agent activity...</div>';
    return;
  }
  for (const msg of S.chatMessages) {
    feed.appendChild(makeChatBubble(msg));
  }
  feed.scrollTop = feed.scrollHeight;
}

function makeChatBubble(msg) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const name = msg.agent || 'System';
  const color = agentColor(name);
  const letter = (name[0] || '?').toUpperCase();

  let body = '';
  switch (msg.type) {
    case 'delegation': {
      const tc = msg.task
        ? `<div class="task-card"><span class="tc-id">${esc(msg.taskId)}</span> <span class="tc-title">${esc(msg.task.title)}</span></div>`
        : `<div class="task-card"><span class="tc-id">${esc(msg.taskId)}</span></div>`;
      body = `<div class="msg-text">${esc(name)} delegated <code>${esc(msg.taskId)}</code> to <strong>${esc(msg.target)}</strong>${tc}</div>`;
      break;
    }
    case 'status_change':
      body = `<div class="msg-text">${esc(msg.message)}<br>${statusBadge(msg.status)}</div>`;
      break;
    case 'handoff': {
      const r = msg.report;
      body = `<div class="msg-text">Handoff report for <code>${esc(msg.task.id)}</code></div>
        <details class="handoff-card"><summary>Handoff Report</summary>
          <div class="hc-section"><h4>Changes Made</h4><p>${esc(r.changesMade)}</p></div>
          <div class="hc-section"><h4>Patterns Followed</h4><p>${esc(r.patternsFollowed)}</p></div>
          <div class="hc-section"><h4>Unresolved Concerns</h4><p>${esc(r.unresolvedConcerns)}</p></div>
          <div class="hc-section"><h4>Suggested Follow-ups</h4><p>${esc(r.suggestedFollowups)}</p></div>
        </details>`;
      break;
    }
    case 'plan_approval': {
      const t = msg.task;
      const btns = t.status === 'plan_ready'
        ? `<div class="action-btns">
            <button class="btn btn-approve" onclick="maestro.approvePlan('${esc(t.id)}')">Approve</button>
            <button class="btn btn-revise" onclick="maestro.revisePlan('${esc(t.id)}')">Revise</button>
          </div>`
        : `<div class="msg-text" style="color:var(--complete);">Plan approved</div>`;
      body = `<div class="msg-text">Proposed approach for <code>${esc(t.id)}</code>:</div>
        <div class="task-card" style="border-left-color:var(--plan_ready);">${esc(t.proposedApproach)}</div>${btns}`;
      break;
    }
    case 'reconciliation':
      body = `<div class="msg-text"><span class="${msg.pass ? 'recon-pass' : 'recon-fail'}">${msg.pass ? 'PASS' : 'FAIL'}</span> ${esc(msg.message)}</div>`;
      break;
    default:
      body = `<div class="msg-text">${esc(msg.message)}</div>`;
  }

  div.innerHTML = `
    <div class="avatar" style="background:${color}">${letter}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="name">${esc(name)}</span>${roleBadge(name)}
        <span class="ts">${fmtTime(msg.ts)}</span>
      </div>${body}
    </div>`;
  return div;
}

function appendChatMessage(msg) {
  S.chatMessages.push(msg);
  const feed = $('#chat-feed');
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  feed.appendChild(makeChatBubble(msg));
  if (atBottom) feed.scrollTop = feed.scrollHeight;
}

function rememberLiveEvent(event) {
  S.liveEvents.unshift(event);
  S.liveEvents = S.liveEvents.slice(0, 40);
  renderRuntimeSidebar();
}

function renderRuntimeSidebar() {
  renderPaneSelector();
  renderEventFeed();
}

function renderPaneSelector() {
  const selector = $('#pane-selector');
  const output = $('#runtime-pane-output');
  const count = $('#runtime-pane-count');
  if (!selector || !output || !count) return;

  count.textContent = `${S.panes.length} pane${S.panes.length === 1 ? '' : 's'}`;

  if (!S.panes.length) {
    selector.innerHTML = '<div class="empty-state">No panes available.</div>';
    output.textContent = 'No tmux panes detected for the configured session.';
    return;
  }

  if (!S.selectedPaneId || !S.panes.some(pane => pane.paneId === S.selectedPaneId)) {
    S.selectedPaneId = S.panes[0].paneId;
  }

  selector.innerHTML = S.panes.map(pane => {
    const selected = pane.paneId === S.selectedPaneId ? 'active' : '';
    const meta = S.paneOutputMeta[pane.paneId];
    const updated = meta?.updatedAt ? fmtTime(meta.updatedAt) : 'waiting';
    return `<button class="pane-chip ${selected}" data-pane-id="${esc(pane.paneId)}">
      <span>${esc(pane.windowName || pane.paneId)}</span>
      <small>${esc(updated)}</small>
    </button>`;
  }).join('');

  selector.querySelectorAll('[data-pane-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      S.selectedPaneId = btn.dataset.paneId;
      renderPaneSelector();
    });
  });

  output.textContent = S.paneOutputs[S.selectedPaneId] || 'Waiting for pane output…';
}

function renderEventFeed() {
  const feed = $('#event-feed');
  const count = $('#event-count');
  if (!feed || !count) return;
  count.textContent = `${S.liveEvents.length} event${S.liveEvents.length === 1 ? '' : 's'}`;

  if (!S.liveEvents.length) {
    feed.innerHTML = '<div class="empty-state">No live workspace changes yet.</div>';
    return;
  }

  feed.innerHTML = S.liveEvents.map(event => `
    <div class="event-item">
      <div class="event-head">
        <span class="event-type">${esc(event.label)}</span>
        <span class="event-time">${fmtTime(event.timestamp)}</span>
      </div>
      <div class="event-body">${esc(event.body)}</div>
      ${event.meta ? `<div class="event-meta">${esc(event.meta)}</div>` : ''}
    </div>
  `).join('');
}

// ── Dashboard ──────────────────────────────────────────────────────
function renderDashboard() {
  const g = $('#dash-grid');
  const s = S.session || {};
  renderRuntimeSidebar();
  const counts = {};
  for (const t of S.tasks) counts[t.status] = (counts[t.status] || 0) + 1;
  const countHtml = Object.entries(counts).map(([k, v]) => `${statusBadge(k)} <strong>${v}</strong>`).join('  ');
  const panesHtml = S.panes.length
    ? `<div class="pane-grid">${S.panes.map(pane => `
        <div class="pane-card">
          <div class="pane-header">
            <div>
              <strong>${esc(pane.windowName || pane.paneId)}</strong>
              <div class="pane-meta"><code>${esc(pane.paneId)}</code> · PID ${esc(String(pane.pid || 0))}</div>
            </div>
            <span class="pane-health ${pane.healthy ? 'healthy' : 'unhealthy'}">${pane.healthy ? 'healthy' : 'stale'}</span>
          </div>
          <pre class="pane-output">${esc(S.paneOutputs[pane.paneId] || 'Waiting for pane output…')}</pre>
        </div>
      `).join('')}</div>`
    : '<div class="empty-state">No tmux panes detected for the configured session.</div>';

  g.innerHTML = `
    <div class="card"><h3>Session</h3>
      <div class="big">${s.status || 'none'}</div>
      <p style="color:var(--text2);font-size:12px;margin-top:6px;">
        ${s.goal ? esc(s.goal).substring(0, 120) : 'No active session'}
      </p>
      ${s.currentWave != null ? `<p style="margin-top:4px;font-size:12px;color:var(--text3);">Wave: ${s.currentWave}</p>` : ''}
    </div>
    <div class="card"><h3>Workers</h3>
      <div class="big">${s.activeWorkerCount || 0}</div>
    </div>
    <div class="card"><h3>Tasks (${S.tasks.length})</h3>
      <div style="margin-top:6px;">${countHtml || '<span style="color:var(--text3)">No tasks</span>'}</div>
    </div>
    <div class="card" style="grid-column: 1/-1;"><h3>Runtime Panes</h3>${panesHtml}</div>
    <div class="card" style="grid-column: 1/-1;"><h3>Recent Log</h3>
      <div class="log-list">${S.logEntries.slice(-30).reverse().map(e =>
        `<div class="log-item"><span class="lt">${fmtTime(e.timestamp)}</span><span class="ll">${esc(e.level || 'info')}</span><span class="la">${esc(e.agent)}</span><span>${esc(e.message)}</span></div>`
      ).join('')}</div>
    </div>`;
}

// ── Tasks ──────────────────────────────────────────────────────────
function renderTasks() {
  renderTaskFilters();
  renderTaskTable();
}

function renderTaskFilters() {
  const waves = [...new Set(S.tasks.map(t => t.wave))].sort();
  const statuses = [...new Set(S.tasks.map(t => t.status))].sort();
  const f = $('#task-filters');
  f.innerHTML = `
    <select id="f-wave"><option value="">All Waves</option>${waves.map(w => `<option value="${w}">Wave ${w}</option>`).join('')}</select>
    <select id="f-status"><option value="">All Statuses</option>${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}</select>`;
  $('#f-wave').addEventListener('change', renderTaskTable);
  $('#f-status').addEventListener('change', renderTaskTable);
}

function renderTaskTable() {
  const wf = ($('#f-wave') || {}).value;
  const sf = ($('#f-status') || {}).value;
  let tasks = S.tasks;
  if (wf) tasks = tasks.filter(t => String(t.wave) === wf);
  if (sf) tasks = tasks.filter(t => t.status === sf);

  const tbody = $('#task-tbody');
  tbody.innerHTML = tasks.map(t => `
    <tr data-id="${esc(t.id)}">
      <td><code>${esc(t.id)}</code></td><td>${esc(t.title)}</td>
      <td>${esc(t.assignedTo)}</td><td>${t.wave}</td>
      <td>${statusBadge(t.status)}</td><td>${esc(t.phase)}</td>
    </tr>`).join('');

  $$('#task-tbody tr').forEach(row => {
    row.addEventListener('click', () => {
      const existing = row.nextElementSibling;
      if (existing && existing.classList.contains('task-detail-row')) {
        existing.remove();
        return;
      }
      const t = S.tasks.find(x => x.id === row.dataset.id);
      if (!t) return;
      const tr = document.createElement('tr');
      tr.className = 'task-detail-row';
      tr.innerHTML = `<td colspan="6"><div class="task-detail">
        <p><strong>Description:</strong> ${esc(t.description)}</p>
        <p><strong>Dependencies:</strong> ${t.dependencies && t.dependencies.length ? t.dependencies.join(', ') : 'none'}</p>
        <p><strong>Parent:</strong> ${t.parentTask || 'none'}</p>
        <p><strong>Plan First:</strong> ${t.planFirst}</p>
        ${t.proposedApproach ? `<p><strong>Proposed Approach:</strong> ${esc(t.proposedApproach)}</p>` : ''}
        ${t.handoffReport ? `<p><strong>Handoff:</strong> ${esc(t.handoffReport.changesMade)}</p>` : ''}
      </div></td>`;
      row.after(tr);
    });
  });
}

// ── Agents ─────────────────────────────────────────────────────────
function renderAgents() {
  const c = $('#agents-container');
  if (!S.agents.length) { c.innerHTML = '<p style="color:var(--text3)">No agents loaded.</p>'; return; }

  const byLevel = {};
  for (const a of S.agents) {
    const lvl = a.level || 3;
    (byLevel[lvl] = byLevel[lvl] || []).push(a);
  }

  let html = '';
  for (const level of [1, 2, 3]) {
    const group = byLevel[level];
    if (!group) continue;
    const indent = level > 1 ? ' hierarchy-indent' : '';
    html += `<h3 style="margin:12px 0 8px;color:var(--text3);font-size:12px;text-transform:uppercase;">Level ${level}${level === 1 ? ' (Maestro)' : level === 2 ? ' (Leads)' : ' (Workers)'}</h3>`;
    html += `<div class="agent-grid${indent}">`;
    for (const a of group) {
      const color = a.color || agentColor(a.name);
      const skills = (a.skills || []).map(s => `<span class="skill-tag">${esc(s)}</span>`).join('');
      html += `<div class="agent-card" style="border-left-color:${color}">
        <h3>${esc(a.name)}</h3>
        <div class="meta">${roleBadge(a.name)} <span style="color:var(--text3)">${esc(a.model || '')}</span>
          ${a.team ? ` &middot; <span style="color:${color}">${esc(a.team)}</span>` : ''}</div>
        ${skills ? `<div class="skills">${skills}</div>` : ''}
      </div>`;
    }
    html += '</div>';
  }
  c.innerHTML = html;
}

// ── Memory ─────────────────────────────────────────────────────────
async function fetchMemoryTree(path = '.') {
  const tree = await api(`/api/memory/tree?path=${encodeURIComponent(path)}`);
  if (tree && Array.isArray(tree.entries)) {
    S.memoryTree[path] = tree.entries;
  }
  return tree;
}

async function openMemoryDirectory(path, options = {}) {
  const tree = await fetchMemoryTree(path);
  if (!tree) return;
  S.memoryPath = path;
  if (!options.preserveSelection) S.memoryFilePath = '';
  renderMemoryBrowser();
}

async function openMemoryFile(path) {
  const file = await api(`/api/memory/file?path=${encodeURIComponent(path)}`);
  if (!file) return;
  S.memoryFilePath = path;
  $('#mem-content').textContent = file.content || '(empty file)';
  renderMemoryBrowser();
}

function renderMemoryBrowser() {
  const sb = $('#mem-sidebar');
  const currentPath = S.memoryPath || '.';
  const entries = S.memoryTree[currentPath] || [];
  const crumbs = currentPath === '.' ? ['memory'] : ['memory', ...currentPath.split('/')];

  sb.innerHTML = `
    <div class="mem-section-title">Browse</div>
    <button class="${currentPath === '.' ? 'active' : ''}" data-dir=".">./</button>
    ${currentPath !== '.' ? `<button data-parent="${esc(currentPath.split('/').slice(0, -1).join('/') || '.')}">../</button>` : ''}
    ${entries.map(entry => `<button class="${S.memoryFilePath === entry.path || (entry.type === 'directory' && currentPath === entry.path) ? 'active' : ''}" data-path="${esc(entry.path)}" data-kind="${entry.type}">${entry.type === 'directory' ? '📁' : '📄'} ${esc(entry.name)}${entry.type === 'directory' ? '/' : ''}</button>`).join('')}
  `;

  if (!S.memoryFilePath) {
    $('#mem-content').textContent = `Path: ${crumbs.join(' / ')}\n\nSelect a file to inspect its contents.`;
  }

  $$('#mem-sidebar button[data-dir]').forEach(btn => {
    btn.addEventListener('click', () => openMemoryDirectory(btn.dataset.dir));
  });
  $$('#mem-sidebar button[data-parent]').forEach(btn => {
    btn.addEventListener('click', () => openMemoryDirectory(btn.dataset.parent));
  });
  $$('#mem-sidebar button[data-path]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.dataset.kind === 'directory') {
        openMemoryDirectory(btn.dataset.path);
      } else {
        openMemoryFile(btn.dataset.path);
      }
    });
  });
}

// ── Config ─────────────────────────────────────────────────────────
function renderConfig() {
  const el = $('#config-display');
  if (S.config) {
    el.textContent = JSON.stringify(S.config, null, 2);
  } else {
    el.textContent = 'Failed to load configuration.';
  }
}

// ── WebSocket ──────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const url = `${proto}://${location.host}`;
  const ws = new WebSocket(url);
  S.ws = ws;

  ws.onopen = () => {
    S.wsOk = true;
    $('#ws-dot').className = 'ws-dot on';
    $('#ws-label').textContent = 'connected';
    syncPaneSubscriptions();
    refreshPanes();
  };

  ws.onclose = () => {
    S.wsOk = false;
    $('#ws-dot').className = 'ws-dot off';
    $('#ws-label').textContent = 'disconnected';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    handleWSEvent(data);
  };
}

function handleWSEvent(data) {
  switch (data.type) {
    case 'file:changed':
      handleFileChange(data);
      break;
    case 'log:entry':
      handleLogEntry(data);
      break;
    case 'pane:output':
      handlePaneOutput(data);
      break;
  }
}

async function handleFileChange(data) {
  const p = data.path || '';
  const fileType = data.fileType || data.type || '';
  const parsed = data.parsed || {};
  const shouldReloadTasks = fileType === 'task' || p.includes('workspace/tasks/');
  const shouldReloadLog = fileType === 'log' || p.includes('workspace/log.');
  const shouldReloadGoal = fileType === 'goal' || p.includes('workspace/goal.md');
  const shouldReloadStatus = fileType === 'status' || p.includes('workspace/status.md');
  const shouldReloadMemory = fileType === 'memory' || p.includes('memory/');

  const taskPatched = shouldReloadTasks && applyTaskPatch(parsed.task);
  const logPatched = shouldReloadLog && applyLogPatch(parsed.lastEntry, parsed.totalEntries);
  if (shouldReloadGoal && typeof parsed.preview === 'string') {
    S.goal = data.content || parsed.preview;
  }

  rememberLiveEvent(describeFileChange(data));

  const requests = [];

  if (shouldReloadTasks && !taskPatched) {
    requests.push(api('/api/tasks').then(tasks => {
      if (tasks) S.tasks = tasks;
    }));
  }

  if (shouldReloadLog && !logPatched) {
    requests.push(api('/api/workspace/log').then(log => {
      if (log && log.entries) S.logEntries = log.entries;
    }));
  }

  if (shouldReloadGoal && typeof parsed.preview !== 'string') {
    requests.push(api('/api/workspace/goal').then(goal => {
      if (goal) S.goal = goal.content || '';
    }));
  }

  if (shouldReloadStatus) {
    requests.push(api('/api/session/active').then(session => {
      if (session) S.session = session;
    }));
    requests.push(api('/api/tmux/panes').then(panes => {
      if (Array.isArray(panes)) S.panes = panes;
    }));
  }

  if (shouldReloadMemory) {
    requests.push(fetchMemoryTree(S.memoryPath || '.'));
    if (S.memoryFilePath && p.endsWith(S.memoryFilePath)) {
      requests.push(api(`/api/memory/file?path=${encodeURIComponent(S.memoryFilePath)}`).then(file => {
        if (file) $('#mem-content').textContent = file.content || '(empty file)';
      }));
    }
  }

  await Promise.all(requests);

  if (shouldReloadTasks || shouldReloadLog) buildChatFromState();
  if (shouldReloadTasks) renderTasks();
  if (shouldReloadMemory && $('#memory-view').classList.contains('active')) renderMemoryBrowser();

  renderDashboard();
  syncPaneSubscriptions();
}

function applyTaskPatch(task) {
  if (!task || !task.id) return false;
  const idx = S.tasks.findIndex(entry => entry.id === task.id);
  if (idx >= 0) {
    S.tasks[idx] = task;
  } else {
    S.tasks.push(task);
  }
  return true;
}

function applyLogPatch(entry, totalEntries) {
  if (!entry || !entry.timestamp) return false;
  const last = S.logEntries[S.logEntries.length - 1];
  if (!last || last.timestamp !== entry.timestamp || last.message !== entry.message || last.agent !== entry.agent) {
    S.logEntries.push(entry);
  }
  if (typeof totalEntries === 'number' && totalEntries < S.logEntries.length) {
    return false;
  }
  return true;
}

function describeFileChange(data) {
  const parsed = data.parsed || {};
  const path = data.path || 'unknown';
  const fileType = data.fileType || 'file';

  if (fileType === 'task' && parsed.task) {
    const task = parsed.task;
    return {
      label: `task:${task.status || 'updated'}`,
      timestamp: data.timestamp,
      body: `${task.id}: ${task.title || 'updated task'}`,
      meta: `${task.assignedTo || 'unassigned'} · phase ${task.phase || 'none'}`,
    };
  }

  if (fileType === 'log' && parsed.lastEntry) {
    return {
      label: 'log:entry',
      timestamp: data.timestamp,
      body: parsed.lastEntry.message || 'Workspace log updated',
      meta: parsed.lastEntry.agent || '',
    };
  }

  if (fileType === 'status' && parsed.summary) {
    const counts = Object.entries(parsed.summary.counts || {}).map(([status, count]) => `${status}:${count}`).join(' · ');
    return {
      label: 'status:summary',
      timestamp: data.timestamp,
      body: counts || 'Workspace status updated',
      meta: path,
    };
  }

  return {
    label: `${fileType}:changed`,
    timestamp: data.timestamp,
    body: path,
    meta: (typeof parsed.preview === 'string' && parsed.preview) ? parsed.preview.slice(0, 120) : '',
  };
}

function handlePaneOutput(data) {
  if (!data || !data.paneId) return;
  const nextContent = data.content || '';
  const previousContent = S.paneOutputs[data.paneId] || '';
  S.paneOutputs[data.paneId] = nextContent;
  S.paneOutputMeta[data.paneId] = { updatedAt: new Date().toISOString() };
  if (nextContent !== previousContent) {
    rememberLiveEvent({
      label: 'pane:output',
      timestamp: new Date().toISOString(),
      body: `${data.paneId} streamed ${String(nextContent.split('\n').length)} lines`,
      meta: nextContent.split('\n').slice(-1)[0] || 'pane updated',
    });
  } else {
    renderRuntimeSidebar();
  }
  if ($('#dashboard-view').classList.contains('active')) renderDashboard();
}

async function refreshPanes() {
  const panes = await api('/api/tmux/panes');
  if (!Array.isArray(panes)) return;
  S.panes = panes;
  renderRuntimeSidebar();
  syncPaneSubscriptions();
  if ($('#dashboard-view').classList.contains('active')) renderDashboard();
}

function syncPaneSubscriptions() {
  if (!S.ws || S.ws.readyState !== WebSocket.OPEN) return;
  for (const pane of S.panes) {
    S.ws.send(JSON.stringify({ type: 'subscribe:pane', paneId: pane.paneId }));
  }
}

function handleLogEntry(data) {
  const entry = { timestamp: data.timestamp, agent: data.agent, message: data.message };
  S.logEntries.push(entry);
  appendChatMessage(classifyLogEntry(entry));
  rememberLiveEvent({
    label: 'log:entry',
    timestamp: data.timestamp,
    body: data.message || 'Runtime log entry',
    meta: data.agent || '',
  });
  renderDashboard();
}

// ── Actions ────────────────────────────────────────────────────────
window.maestro = {
  async approvePlan(taskId) {
    const r = await fetch(API + '/api/actions/approve-plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ taskId }),
    });
    if (r.ok) {
      const data = await r.json();
      const idx = S.tasks.findIndex(t => t.id === taskId);
      if (idx >= 0 && data.task) S.tasks[idx] = data.task;
      buildChatFromState();
      renderTasks();
    } else {
      const err = await r.json().catch(() => ({}));
      alert('Approve failed: ' + (err.error || r.statusText));
    }
  },

  async revisePlan(taskId) {
    const feedback = prompt('Enter revision feedback:');
    if (!feedback) return;
    const r = await fetch(API + '/api/actions/revise-plan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ taskId, feedback }),
    });
    if (r.ok) {
      const tasks = await api('/api/tasks');
      if (tasks) S.tasks = tasks;
      buildChatFromState();
      renderTasks();
    } else {
      const err = await r.json().catch(() => ({}));
      alert('Revise failed: ' + (err.error || r.statusText));
    }
  },
};

// ── Init ───────────────────────────────────────────────────────────
loadAll();
connectWS();
})();
</script>
